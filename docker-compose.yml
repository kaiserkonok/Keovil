services:
  keovil:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keovil_container
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility] # 👈 CRITICAL: Added compute/utility
    shm_size: '4gb'
    ports:
      - "5000:5000"
      - "6333:6333"
      - "7977:7977"
    environment:
      - APP_MODE=production
      - NVIDIA_VISIBLE_DEVICES=all           # 👈 Added
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility # 👈 Added
      - GGML_CUDA=1                          # 👈 Added
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ${HOME}/.keovil:/root/.keovil
      - ${HOME}/.keovil_storage:/root/.keovil_storage
      - ${HOME}/.keovil_storage/qdrant_storage:/qdrant/storage
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/.keovil_storage/keo:/opt/.vault/binaries
      - ${HOME}/.EasyOCR:/root/.EasyOCR
    restart: unless-stopped