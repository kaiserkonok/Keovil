services:
  keovil:
    build:
      context: .
      dockerfile: Dockerfile
    image: keovil-local:latest
    container_name: keovil_container
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: '4gb'
    network_mode: host
    environment:
      - APP_MODE=production
      - OLLAMA_HOST=localhost:11434
      - OLLAMA_KEEP_ALIVE=-1
      - CUDA_MODULE_LOADING=LAZY
    volumes:
      - ${HOME}/.keovil_storage:/root/.keovil_storage
      - ${HOME}/.keovil:/root/.keovil
      - ${HOME}/.keovil_storage/qdrant_storage:/qdrant/storage
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped
