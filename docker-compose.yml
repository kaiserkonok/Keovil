services:
  keovil:
    image: kevilai/keovil:latest
    container_name: keovil_container
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: '4gb'
    ports:
      - "5000:5000"
      - "6333:6333"
    environment:
      - APP_MODE=production
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_INTEL_GPU=false
      - CUDA_MODULE_LOADING=LAZY
    volumes:
      # All volumes from your working command:
      - ${HOME}/.keovil:/root/.keovil
      - ${HOME}/.keovil_storage:/root/.keovil_storage
      - ${HOME}/.keovil_storage/qdrant_storage:/qdrant/storage
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped