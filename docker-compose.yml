services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_container
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ${HOME}/.kevil_krag_storage/qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_container
    runtime: nvidia
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ${HOME}/.kevil_krag_storage/ollama_docker_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  k-rag-app:
    build: .
    container_name: rag_app_container
    runtime: nvidia
    shm_size: '4gb'
    restart: unless-stopped
    environment:
      - APP_MODE=production
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=http://ollama:11434
      - NVIDIA_VISIBLE_DEVICES=all
      - DOCLING_DEVICE=cuda
      - TRANSFORMERS_OFFLINE=1
      - CUDA_MODULE_LOADING=LAZY
    depends_on:
      - qdrant
      - ollama
    ports:
      - "5000:5000"
    volumes:
      - ${HOME}/.kevil_krag_storage:/root/.kevil_krag_storage
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      # 🛡️ HWID STABILITY: Mount host identity to keep hardware signature persistent
      - /etc/machine-id:/etc/machine-id:ro
      - /var/lib/dbus/machine-id:/var/lib/dbus/machine-id:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]