<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RAG Chat — Lora</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      --bg-deep: #0a0c10;
      --bg-sidebar: #0d1117;
      --border: #30363d;
      --accent: #58a6ff;
      --text-main: #e6edf3;
      --muted: #8b949e;
      --user-bg: #161b22;
      --ai-bg: #0d1117;
      --sidebar-width: 260px;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      overflow: hidden;
    }

    body { display: flex; flex-direction: row; }

    /* --- Sidebar --- */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-header {
      padding: 25px 20px;
      border-bottom: 1px solid var(--border);
    }

    .new-chat-btn {
      width: 100%;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--accent);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      transition: all 0.2s;
    }

    .new-chat-btn:hover {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
      letter-spacing: 0.5px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: 0.2s;
      border: 1px solid transparent;
    }

    .history-item:hover {
      background: var(--user-bg);
      color: var(--text-main);
    }

    .history-item.active {
      background: rgba(88, 166, 255, 0.08);
      border-color: rgba(88, 166, 255, 0.3);
      color: var(--accent);
    }

    /* --- Content --- */
    .content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg-deep);
    }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 15px 40px;
      background: var(--bg-deep);
    }

    .brand-link {
      color: var(--accent);
      font-weight: 300;
      font-size: 20px;
      font-family: 'Fira Code', monospace;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      letter-spacing: -0.5px;
    }

    .brand-link:hover {
      letter-spacing: 1.5px;
      text-shadow: 0 0 15px rgba(88, 166, 255, 0.7);
    }

    .main-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 40px 180px 40px;
      display: flex;
      flex-direction: column;
    }

    #messages {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .bubble {
      max-width: 85%;
      padding: 16px 22px;
      font-size: 15px;
      line-height: 1.6;
      border-radius: 12px;
      animation: fadeIn 0.3s ease forwards;
    }

    .user {
      align-self: flex-end;
      background: var(--user-bg);
      border: 1px solid var(--border);
      color: #d2a8ff;
      font-family: 'Fira Code', monospace;
      border-bottom-right-radius: 2px;
    }

    .ai {
      align-self: flex-start;
      background: var(--ai-bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-bottom-left-radius: 2px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .ai pre { background: #000; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; border: 1px solid var(--border); }
    .ai code { font-family: 'Fira Code', monospace; font-size: 0.9em; }
    .ai p { margin: 0 0 12px 0; }
    .ai p:last-child { margin-bottom: 0; }

    /* --- Input Area --- */
    .query-bar {
      position: absolute;
      bottom: 0; left: 0; width: 100%;
      background: linear-gradient(to top, var(--bg-deep) 60%, transparent);
      padding: 40px 0;
      backdrop-filter: blur(10px);
    }

    .query-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      padding: 0 20px;
    }

    .query-input {
      flex: 1;
      background: #010409;
      border: 1px solid var(--border);
      color: white;
      padding: 16px 24px;
      border-radius: 14px;
      outline: none;
      font-size: 15px;
      transition: all 0.2s;
    }

    .query-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.15);
    }

    .run-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0 28px;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Fira Code', monospace;
      transition: all 0.2s;
    }

    .run-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(88, 166, 255, 0.05);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>

<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="startNewChat()">+ New Session</button>
    </div>
    <div id="historyList" class="history-list"></div>
  </div>

  <div class="content-wrapper">
    <div class="header-area">
      <a href="/" class="brand-link">&lt;Lora Lab /&gt;</a>
      <div id="sessionLabel" style="color: var(--muted); font-size: 11px; font-family: 'Fira Code'; text-transform: uppercase;">Direct Connection</div>
    </div>

    <div class="main-container">
      <div id="messages"></div>
    </div>

    <div class="query-bar">
      <div class="query-container">
        <input id="inputBox" class="query-input" placeholder="Ask Lora anything..." autocomplete="off" autofocus />
        <button id="sendBtn" class="run-btn">Run</button>
      </div>
    </div>
  </div>

<script>
/**
 * Initialization & Identity
 */
const md = window.markdownit({
    html: true,
    highlight: function (str, lang) {
        if (lang && hljs.getLanguage(lang)) {
            try { return '<pre class="hljs"><code>' + hljs.highlight(str, { language: lang }).value + '</code></pre>'; } catch (__) {}
        }
        return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
    }
});

const messages = document.getElementById('messages');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');
const historyList = document.getElementById('historyList');
const sessionLabel = document.getElementById('sessionLabel');

let currentSessionId = null;

// Handle User Identity via LocalStorage
let userId = localStorage.getItem('lora_user_id');
if (!userId) {
    userId = 'user_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    localStorage.setItem('lora_user_id', userId);
}

/**
 * API Wrapper
 * Automatically adds the X-User-ID header to all requests
 */
async function apiFetch(url, options = {}) {
    const defaultHeaders = {
        'X-User-ID': userId,
        'Content-Type': 'application/json'
    };

    options.headers = {
        ...defaultHeaders,
        ...options.headers
    };

    return fetch(url, options);
}

/**
 * Session Management
 */
async function loadSessions() {
    try {
        const res = await apiFetch('/api/chat/sessions');
        const sessions = await res.json();

        historyList.innerHTML = '';
        sessions.forEach(s => {
            const item = document.createElement('div');
            item.className = `history-item ${currentSessionId == s.id ? 'active' : ''}`;
            item.textContent = s.title;
            item.onclick = () => switchSession(s.id);
            historyList.appendChild(item);
        });
    } catch (err) {
        console.error("Failed to load sessions:", err);
    }
}

async function switchSession(id) {
    currentSessionId = id;
    sessionLabel.textContent = `Session: #${id}`;
    messages.innerHTML = '';

    try {
        const res = await apiFetch(`/api/chat/history/${id}`);
        const history = await res.json();

        history.forEach(m => {
            if(m.role === 'user') appendUser(m.content);
            else appendAssistant(m.content);
        });

        loadSessions();
    } catch (err) {
        console.error("Failed to load history:", err);
    }
}

function startNewChat() {
    currentSessionId = null;
    messages.innerHTML = '';
    sessionLabel.textContent = "Direct Connection";
    inputBox.focus();
    loadSessions();
}

/**
 * UI Rendering
 */
function appendUser(text) {
    const el = document.createElement('div');
    el.className = 'bubble user';
    el.textContent = text;
    messages.appendChild(el);
    scrollToBottom();
}

function appendAssistant(text) {
    const el = document.createElement('div');
    el.className = 'bubble ai';
    el.innerHTML = md.render(text);
    messages.appendChild(el);
    el.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    scrollToBottom();
}

function appendPlaceholder() {
    const el = document.createElement('div');
    el.className = 'bubble ai';
    el.innerHTML = `<span style="color:var(--accent); font-family:'Fira Code'; font-size:12px;">Analysing...</span>`;
    messages.appendChild(el);
    scrollToBottom();
    return el;
}

function scrollToBottom() {
    messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
}

/**
 * Core Logic
 */
async function handleQuery(query) {
    appendUser(query);
    const placeholder = appendPlaceholder();

    try {
        const res = await apiFetch('/api/chat', {
            method: 'POST',
            body: JSON.stringify({
                query,
                session_id: currentSessionId
            })
        });

        const data = await res.json();

        if (data.error) {
            placeholder.textContent = "Error: " + data.error;
        } else {
            const isFirstInSession = !currentSessionId;
            currentSessionId = data.session_id;

            placeholder.remove();
            appendAssistant(data.response);

            if (isFirstInSession) {
                sessionLabel.textContent = `Session: #${currentSessionId}`;
                setTimeout(() => { loadSessions(); }, 250);
            }
        }
    } catch (err) {
        placeholder.textContent = "Connection lost. Please try again.";
        console.error(err);
    }
}

/**
 * Event Listeners
 */
sendBtn.onclick = () => {
    const q = inputBox.value.trim();
    if (!q) return;
    inputBox.value = '';
    handleQuery(q);
};

inputBox.onkeydown = e => {
    if (e.key === 'Enter') sendBtn.click();
};

// Initial load
loadSessions();
</script>
</body>
</html>
