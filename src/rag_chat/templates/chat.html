<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Knowledge Lab | Kevil</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      --bg-deep: #0a0c10;
      --bg-sidebar: #0d1117;
      --border: #30363d;
      --accent: #58a6ff;
      --text-main: #e6edf3;
      --muted: #8b949e;
      --user-bg: #161b22;
      --ai-bg: #0d1117;
      --sidebar-width: 260px;
      --danger: #ff7b72;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      overflow: hidden;
    }

    body { display: flex; flex-direction: row; }

    /* --- Sidebar --- */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-header {
      padding: 25px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .new-chat-btn {
      width: 100%;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--accent);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      transition: all 0.2s;
    }

    .new-chat-btn:hover {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
      letter-spacing: 0.5px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }

    .history-container {
      display: flex;
      align-items: center;
      group: hover;
      border-radius: 8px;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .history-item {
      flex: 1;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: 0.2s;
    }

    .history-container:hover {
      background: var(--user-bg);
    }

    .history-container:hover .history-item {
      color: var(--text-main);
    }

    .history-container.active {
      background: rgba(88, 166, 255, 0.08);
      border: 1px solid rgba(88, 166, 255, 0.3);
    }

    .history-container.active .history-item {
      color: var(--accent);
    }

    .delete-session-btn {
      background: none;
      border: none;
      color: transparent;
      padding: 0 12px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    .history-container:hover .delete-session-btn {
      color: var(--muted);
    }

    .delete-session-btn:hover {
      color: var(--danger) !important;
      transform: scale(1.2);
    }

    /* --- Sexy Modal Styles (Added Only) --- */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: modalFade 0.2s ease;
    }
    .modal-box {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .modal-msg { font-size: 14px; margin-bottom: 20px; color: var(--text-main); }
    .modal-btns { display: flex; gap: 10px; }
    .m-btn {
      flex: 1; padding: 10px; border-radius: 6px; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 12px; transition: 0.2s;
      border: 1px solid var(--border);
    }
    .m-cancel { background: transparent; color: var(--muted); }
    .m-cancel:hover { background: var(--user-bg); color: var(--text-main); }
    .m-delete { background: rgba(255, 123, 114, 0.1); color: var(--danger); border-color: rgba(255, 123, 114, 0.3); }
    .m-delete:hover { background: var(--danger); color: white; }
    @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }

    /* --- Content --- */
    .content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg-deep);
    }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 15px 40px;
      background: var(--bg-deep);
    }

    .brand-link {
      color: var(--accent);
      font-weight: 300;
      font-size: 20px;
      font-family: 'Fira Code', monospace;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      letter-spacing: -0.5px;
    }

    .brand-link:hover {
      letter-spacing: 1.5px;
      text-shadow: 0 0 15px rgba(88, 166, 255, 0.7);
    }

    .main-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 40px 180px 40px;
      display: flex;
      flex-direction: column;
    }

    #messages {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .bubble {
      max-width: 85%;
      padding: 16px 22px;
      font-size: 15px;
      line-height: 1.6;
      border-radius: 12px;
      animation: fadeIn 0.3s ease forwards;
    }

    .user {
      align-self: flex-end;
      background: var(--user-bg);
      border: 1px solid var(--border);
      color: #d2a8ff;
      font-family: 'Fira Code', monospace;
      border-bottom-right-radius: 2px;
    }

    .ai {
      align-self: flex-start;
      background: var(--ai-bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-bottom-left-radius: 2px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .ai pre { background: #000; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; border: 1px solid var(--border); }
    .ai code { font-family: 'Fira Code', monospace; font-size: 0.9em; }
    .ai p { margin: 0 0 12px 0; }
    .ai p:last-child { margin-bottom: 0; }

    /* --- Input Area --- */
    .query-bar {
      position: absolute;
      bottom: 0; left: 0; width: 100%;
      background: linear-gradient(to top, var(--bg-deep) 60%, transparent);
      padding: 40px 0;
      backdrop-filter: blur(10px);
    }

    .query-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      padding: 0 20px;
    }

    .query-input {
      flex: 1;
      background: #010409;
      border: 1px solid var(--border);
      color: white;
      padding: 16px 24px;
      border-radius: 14px;
      outline: none;
      font-size: 15px;
      transition: all 0.2s;
    }

    .query-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.15);
    }

    .run-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0 28px;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Fira Code', monospace;
      transition: all 0.2s;
    }

    .run-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(88, 166, 255, 0.05);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Status Indicator Styles */
    .status-indicator {
        width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
    }
    .pulse-amber {
        background: #e3b341; box-shadow: 0 0 10px #e3b341;
        animation: status-pulse 1.5s infinite;
    }
    .pulse-green {
        background: #3fb950; box-shadow: 0 0 10px #3fb950;
        animation: status-pulse 1s infinite;
    }
    @keyframes status-pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.3); opacity: 0.5; }
        100% { transform: scale(1); opacity: 1; }
    }

    /* Silent Input Lock */
    .query-input:disabled {
        cursor: wait;
        border-color: var(--accent);
        animation: borderPulse 2s infinite ease-in-out;
        opacity: 0.8;
    }
    @keyframes borderPulse {
        0% { box-shadow: 0 0 0px rgba(88, 166, 255, 0); }
        50% { box-shadow: 0 0 15px rgba(88, 166, 255, 0.2); }
        100% { box-shadow: 0 0 0px rgba(88, 166, 255, 0); }
    }

    /* Hot Scrollbar Styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>

<body>
  <div id="deleteModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-msg">Delete this session?</div>
      <div class="modal-btns">
        <button class="m-btn m-cancel" onclick="closeModal()">Cancel</button>
        <button id="confirmDelBtn" class="m-btn m-delete">Delete</button>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="startNewChat()">+ New Session</button>
    </div>
    <div id="historyList" class="history-list"></div>
  </div>

  <div class="content-wrapper">
    <div class="header-area">
      <a href="/" class="brand-link">&lt;Knowledge Lab /&gt;</a>
      <div id="sessionLabel" style="color: var(--muted); font-size: 11px; font-family: 'Fira Code'; text-transform: uppercase;">Direct Connection</div>
    </div>

    <div class="main-container">
      <div id="messages"></div>
    </div>

    <div class="query-bar">
      <div class="query-container">
        <input id="inputBox" class="query-input" placeholder="Ask Lora anything..." autocomplete="off" autofocus />
        <button id="sendBtn" class="run-btn">Run</button>
      </div>
    </div>
  </div>

  <div id="ingest-status-card" style="display:none; position:fixed; bottom:120px; right:40px; width:320px; background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; transition: all 0.3s ease;">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <div id="status-dot" class="status-indicator"></div>
        <span id="status-title" style="font-family: 'Fira Code', monospace; font-size: 12px; color: var(--accent); font-weight: 500;">ENGINE ACTIVE</span>
    </div>
    <div style="height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; margin: 8px 0;">
        <div id="ingest-progress-bar" style="height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease;"></div>
    </div>
    <span id="current-status-detail" style="font-size: 11px; font-family: 'Fira Code', monospace; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;">Initializing...</span>
  </div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
/**
 * Initialization & Identity
 */
const md = window.markdownit({
    html: true,
    highlight: function (str, lang) {
        if (lang && hljs.getLanguage(lang)) {
            try { return '<pre class="hljs"><code>' + hljs.highlight(str, { language: lang }).value + '</code></pre>'; } catch (__) {}
        }
        return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
    }
});

const messages = document.getElementById('messages');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');
const historyList = document.getElementById('historyList');
const sessionLabel = document.getElementById('sessionLabel');
const deleteModal = document.getElementById('deleteModal');
const confirmDelBtn = document.getElementById('confirmDelBtn');

let currentSessionId = null;

let userId = localStorage.getItem('lora_user_id');
if (!userId) {
    userId = 'user_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    localStorage.setItem('lora_user_id', userId);
}

async function apiFetch(url, options = {}) {
    const defaultHeaders = {
        'X-User-ID': userId,
        'Content-Type': 'application/json'
    };
    options.headers = { ...defaultHeaders, ...options.headers };
    return fetch(url, options);
}

/**
 * Modal Controls
 */
function closeModal() {
    deleteModal.style.display = 'none';
}

/**
 * Session Management
 */
async function loadSessions() {
    try {
        const res = await apiFetch('/api/chat/sessions');
        const sessions = await res.json();

        historyList.innerHTML = '';
        sessions.forEach(s => {
            const container = document.createElement('div');
            container.className = `history-container ${currentSessionId == s.id ? 'active' : ''}`;

            const item = document.createElement('div');
            item.className = 'history-item';
            item.textContent = s.title;
            item.onclick = () => switchSession(s.id);

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-session-btn';
            delBtn.innerHTML = '&times;';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                // Instead of native confirm, show sexy modal
                deleteModal.style.display = 'flex';
                confirmDelBtn.onclick = () => executeDelete(s.id);
            };

            container.appendChild(item);
            container.appendChild(delBtn);
            historyList.appendChild(container);
        });
    } catch (err) {
        console.error("Failed to load sessions:", err);
    }
}

async function executeDelete(id) {
    closeModal();
    try {
        await apiFetch('/api/chat/sessions/delete', {
            method: 'POST',
            body: JSON.stringify({ session_id: id })
        });
        if (currentSessionId == id) {
            startNewChat();
        } else {
            loadSessions();
        }
    } catch (err) {
        console.error("Delete failed:", err);
    }
}

// Kept for backward compat if called elsewhere, but we use executeDelete now
async function deleteSession(id) {
    executeDelete(id);
}

async function switchSession(id) {
    currentSessionId = id;
    sessionLabel.textContent = `Session: #${id}`;
    messages.innerHTML = '';

    try {
        const res = await apiFetch(`/api/chat/history/${id}`);
        const history = await res.json();
        history.forEach(m => {
            if(m.role === 'user') appendUser(m.content);
            else appendAssistant(m.content);
        });
        loadSessions();
    } catch (err) {
        console.error("Failed to load history:", err);
    }
}

function startNewChat() {
    currentSessionId = null;
    messages.innerHTML = '';
    sessionLabel.textContent = "Direct Connection";
    inputBox.focus();
    loadSessions();
}

/**
 * UI Rendering
 */
function appendUser(text) {
    const el = document.createElement('div');
    el.className = 'bubble user';
    el.textContent = text;
    messages.appendChild(el);
    scrollToBottom();
}

function appendAssistant(text) {
    const el = document.createElement('div');
    el.className = 'bubble ai';
    el.innerHTML = md.render(text);
    messages.appendChild(el);
    el.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    scrollToBottom();
}

function appendPlaceholder() {
    const el = document.createElement('div');
    el.className = 'bubble ai';
    el.innerHTML = `<span style="color:var(--accent); font-family:'Fira Code'; font-size:12px;">Analysing...</span>`;
    messages.appendChild(el);
    scrollToBottom();
    return el;
}

function scrollToBottom() {
    messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
}

let isLoraBusy = false; // The "Pro" Lock

async function handleQuery(query) {
    if (isLoraBusy) return;

    isLoraBusy = true;
    $('#ingest-status-card').stop(true, true).fadeOut(200);
    // UI Feedback: Immediately lock the buttons
    inputBox.disabled = true;
    sendBtn.disabled = true;

    appendUser(query);
    const placeholder = appendPlaceholder();

    try {
        const res = await apiFetch('/api/chat', {
            method: 'POST',
            body: JSON.stringify({ query, session_id: currentSessionId })
        });

        const data = await res.json();
        if (data.error) {
            placeholder.textContent = "Error: " + data.error;
        } else {
            const isFirstInSession = !currentSessionId;
            currentSessionId = data.session_id;
            placeholder.remove();
            appendAssistant(data.response);
            if (isFirstInSession) {
                sessionLabel.textContent = `Session: #${currentSessionId}`;
                setTimeout(() => { loadSessions(); }, 250);
            }
        }
    } catch (err) {
        placeholder.textContent = "Connection lost. Please try again.";
    } finally {
        isLoraBusy = false;
        // ALWAYS re-enable here so you never get stuck
        inputBox.disabled = false;
        sendBtn.disabled = false;
        inputBox.focus();
    }
}

// Update the click handler to respect the lock
sendBtn.onclick = () => {
    if (isLoraBusy) return; // Don't even try if busy
    const q = inputBox.value.trim();
    if (!q) return;
    inputBox.value = '';
    handleQuery(q);
};

inputBox.onkeydown = e => {
    if (e.key === 'Enter') sendBtn.click();
};

loadSessions();


// Initialize Socket Connection
const socket = io();

socket.on('system_status', function(data) {
    const card = $('#ingest-status-card');
    const dot = document.getElementById('status-dot');
    const bar = document.getElementById('ingest-progress-bar');
    const title = document.getElementById('status-title');
    const detailText = document.getElementById('current-status-detail');

    if (!dot || !detailText) return;

    // 1. DETERMINE IF SYSTEM IS BUSY (Vectorizing or Answering)
    const isVectorizing = (data.reason === 'processing' || data.reason === 'waiting');

    // 2. TOGGLE INPUT LOCK
    // We disable the input if the AI is answering OR if the engine is vectorizing
    const shouldLockInput = isLoraBusy || isVectorizing;

    inputBox.disabled = shouldLockInput;
    sendBtn.disabled = shouldLockInput;

    // Update placeholder text to explain why it's locked
    if (isVectorizing && !isLoraBusy) {
        inputBox.placeholder = "System updating... please wait.";
    } else if (!isLoraBusy) {
        inputBox.placeholder = "Ask Lora anything...";
    }

    // 3. UI VISIBILITY RULES
    if (isLoraBusy) {
        card.stop(true, true).fadeOut(200);
        return;
    }

    if (isVectorizing) {
        card.stop(true, true).fadeIn(200);

        if (data.reason === 'waiting') {
            dot.className = 'status-indicator pulse-amber';
            title.innerText = "QUEUING BATCH...";
            dot.style.background = "#e3b341";
        } else {
            dot.className = 'status-indicator pulse-green';
            if (data.rag.current_file && data.rag.current_file.includes("Purging")) {
                title.innerText = "PURGING DATA...";
                dot.style.background = "#ff7b72";
            } else {
                title.innerText = "VECTORIZING (GPU)...";
                dot.style.background = "#3fb950";
            }
        }

        detailText.innerText = data.rag.current_file || data.rag.message || "Working...";
        bar.style.width = (data.rag.progress || 10) + "%";
    }
    else {
        card.stop(true, true).fadeOut(800);
    }
});

</script>
</body>
</html>
