<!-- src/rag_chat/templates/chat.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RAG Chat — Lora</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07080b;
      --bg-soft:#0b0c10;
      --panel:#0e1016;
      --panel-2:#10131a;
      --muted:#9aa3b2;
      --text:#e6eef6;
      --accent:#7b61ff;
    }

    html,body{
      height:100%;
      margin:0;
      font-family:'Inter',system-ui,Arial;
      background:
        radial-gradient(1200px 600px at 50% -10%, #0f1016 0%, transparent 60%),
        linear-gradient(180deg,#07080b,#0b0c10);
      color:var(--text);
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .app{
      width:100%;
      max-width:980px;
      height:92vh;
      display:flex;
      flex-direction:column;
      background:transparent;
    }

    .header{
      height:60px;
      display:flex;
      align-items:center;
      padding:0 22px;
    }

    .brand{
      font-weight:700;
      color:#c7bfff;
      font-size:17px;
      letter-spacing:.3px;
    }

    .meta{
      font-size:12px;
      color:var(--muted);
    }

    .main{
      flex:1;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    #messages{
      flex:1;
      padding:26px 22px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .bubble{
      max-width:70%;
      padding:12px 14px;
      border-radius:14px;
      word-break:break-word;
      line-height:1.45;
    }

    .user{
      align-self:flex-end;
      background:#1a1e2b;
      color:#eaf0ff;
      font-weight:600;
    }

    .ai{
      align-self:flex-start;
      background:#0e1016;
      color:var(--text);
    }

    .inputBar{
      display:flex;
      gap:12px;
      padding:16px 22px 20px;
    }

    .input{
      flex:1;
      padding:13px 15px;
      border-radius:12px;
      background:#0c0e14;
      border:none;
      outline:none;
      color:#fff;
      font-size:15px;
    }

    .input::placeholder{
      color:#7d8696;
    }

    .input:focus{
      outline:1px solid rgba(123,97,255,.25);
    }

    /* 🔥 Dark premium button */
    .sendBtn{
      padding:12px 18px;
      border-radius:12px;
      background:#141726;
      border:1px solid rgba(255,255,255,0.04);
      color:#e6e9ff;
      font-weight:600;
      cursor:pointer;
      transition:
        background .15s ease,
        transform .12s ease,
        border-color .15s ease;
    }

    .sendBtn:hover{
      background:#191d2f;
      border-color:rgba(123,97,255,.25);
      transform:translateY(-1px);
    }

    .sendBtn:active{
      transform:translateY(0);
    }

    .typing{
      display:inline-flex;
      gap:6px;
      align-items:center;
      padding:6px 10px;
      border-radius:10px;
      background:#0e1016;
    }

    .dot{
      width:7px;
      height:7px;
      background:#9aa3b2;
      border-radius:50%;
      opacity:.35;
      animation:blink 1s infinite;
    }

    .dot:nth-child(2){animation-delay:.12s}
    .dot:nth-child(3){animation-delay:.24s}

    @keyframes blink{
      0%{opacity:.25}
      50%{opacity:1}
      100%{opacity:.25}
    }

    @media (max-width:900px){
      .app{height:100vh}
      .bubble{max-width:85%}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="brand">Lora — Private RAG Assistant</div>
      <div style="flex:1"></div>
      <div class="meta">Local demo</div>
    </div>

    <div class="main">
      <div id="messages"></div>

      <div class="inputBar">
        <input id="inputBox" class="input" placeholder="Type your question…" autocomplete="off" />
        <button id="sendBtn" class="sendBtn">Send</button>
      </div>
    </div>
  </div>

<script>
const messages = document.getElementById('messages');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');

let history = [];

function appendUser(text){
  const el = document.createElement('div');
  el.className = 'bubble user';
  el.textContent = text;
  messages.appendChild(el);
  messages.scrollTop = messages.scrollHeight;
}

function appendAssistantPlaceholder(){
  const el = document.createElement('div');
  el.className = 'bubble ai';
  messages.appendChild(el);
  return el;
}

function appendTyping(el){
  el.innerHTML = `
    <span class="typing">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </span>`;
}

function removeTyping(el){
  el.innerHTML = '';
}

async function streamQuery(query){
  appendUser(query);
  const placeholder = appendAssistantPlaceholder();
  appendTyping(placeholder);

  const res = await fetch('/api/stream_chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({query, history})
  });

  if(!res.ok){
    placeholder.textContent='(error)';
    return;
  }

  const reader=res.body.getReader();
  const decoder=new TextDecoder();
  let buffer='', text='';

  while(true){
    const {value,done}=await reader.read();
    if(done) break;

    buffer+=decoder.decode(value,{stream:true});
    const parts=buffer.split('\n\n');
    buffer=parts.pop();

    for(const part of parts){
      if(!part.trim()||part.includes('event:')) continue;
      const chunk=part.replace(/^data:\s?/,'');
      if(placeholder.querySelector('.typing')) removeTyping(placeholder);
      placeholder.textContent+=chunk;
      text+=chunk;
      messages.scrollTop=messages.scrollHeight;
    }
  }

  history.push({role:'user',content:query});
  history.push({role:'assistant',content:text});
}

sendBtn.onclick=()=>{
  const q=inputBox.value.trim();
  if(!q) return;
  inputBox.value='';
  streamQuery(q);
};

inputBox.addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();sendBtn.click();}
});

inputBox.focus();
</script>
</body>
</html>
