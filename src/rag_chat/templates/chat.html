<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RAG Chat — Lora</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      --bg-deep: #0a0c10;
      --border: #30363d;
      --accent: #58a6ff;
      --text-main: #e6edf3;
      --muted: #8b949e;
      --user-bg: #161b22;
      --ai-bg: #0d1117;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      overflow: hidden;
    }

    body { display: flex; flex-direction: column; }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 15px 40px;
      background: var(--bg-deep);
    }

    .main-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 40px 180px 40px;
      display: flex;
      flex-direction: column;
    }

    #messages {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 18px;
      font-size: 15px;
      line-height: 1.6;
      border-radius: 12px;
      animation: fadeIn 0.3s ease;
    }

    .user {
      align-self: flex-end;
      background: var(--user-bg);
      border: 1px solid var(--border);
      color: #d2a8ff;
      font-family: 'Fira Code', monospace;
      border-bottom-right-radius: 2px;
    }

    .ai {
      align-self: flex-start;
      background: var(--ai-bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-bottom-left-radius: 2px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* Markdown Specific Styling */
    .ai p { margin: 0 0 10px 0; }
    .ai p:last-child { margin-bottom: 0; }
    .ai code { font-family: 'Fira Code', monospace; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; font-size: 0.9em; }
    .ai pre { background: #000; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; border: 1px solid var(--border); }
    .ai pre code { background: none; padding: 0; }
    .ai ul, .ai ol { padding-left: 20px; margin: 10px 0; }

    .query-bar {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      background: rgba(10, 12, 16, 0.9);
      padding: 30px 0;
      border-top: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .query-container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      padding: 0 20px;
    }

    .query-input {
      flex: 1;
      background: #010409;
      border: 1px solid var(--accent);
      color: white;
      padding: 14px 20px;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
    }

    .run-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0 25px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Fira Code', monospace;
      transition: 0.2s;
    }

    .run-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>

<body>
  <div class="header-area">
    <h1 style="color: var(--accent); font-weight: 300; margin: 0; font-size: 20px; font-family: 'Fira Code';">&lt;Lora Lab /&gt;</h1>
    <div style="color: var(--muted); font-size: 12px; font-family: 'Fira Code';">Session: Chat</div>
  </div>

  <div class="main-container">
    <div id="messages"></div>
  </div>

  <div class="query-bar">
    <div class="query-container">
      <input id="inputBox" class="query-input" placeholder="Ask a question..." autocomplete="off" autofocus />
      <button id="sendBtn" class="run-btn">Run</button>
    </div>
  </div>

<script>
// Initialize Markdown Parser
const md = window.markdownit({
    html: true,
    linkify: true,
    typographer: true,
    highlight: function (str, lang) {
        if (lang && hljs.getLanguage(lang)) {
            try {
                return '<pre class="hljs"><code>' +
                       hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                       '</code></pre>';
            } catch (__) {}
        }
        return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
    }
});

const messages = document.getElementById('messages');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');

let history = [];

function appendUser(text){
  const el = document.createElement('div');
  el.className = 'bubble user';
  el.textContent = text;
  messages.appendChild(el);
  messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
}

function appendAssistantPlaceholder(){
  const el = document.createElement('div');
  el.className = 'bubble ai';
  el.innerHTML = `<span style="color:var(--accent); font-family:'Fira Code'; font-size:12px;">Analysing...</span>`;
  messages.appendChild(el);
  messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
  return el;
}

async function handleQuery(query){
  appendUser(query);
  const placeholder = appendAssistantPlaceholder();

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query, history})
    });

    const data = await res.json();

    if (data.error) {
        placeholder.textContent = "Error: " + data.error;
    } else {
        const fullText = data.response;

        // Render Markdown and highlight code
        placeholder.innerHTML = md.render(fullText);
        placeholder.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
        });

        // Update session history
        history.push({role:'user', content:query});
        history.push({role:'assistant', content:fullText});
    }
  } catch (err) {
    placeholder.textContent = "Error connecting to server: " + err.message;
  }

  messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
}

sendBtn.onclick=()=>{
  const q=inputBox.value.trim();
  if(!q) return;
  inputBox.value='';
  handleQuery(q);
};

inputBox.addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();sendBtn.click();}
});
</script>
</body>
</html>
