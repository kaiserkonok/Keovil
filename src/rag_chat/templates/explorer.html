<!-- src/rag_chat/templates/explorer.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RAG Explorer — Beast Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        :root{
            --bg:#0f1115; --panel:#0b0c0f; --muted:#9aa3b2; --accent:#6cc0ff; --accent-2:#7b61ff;
            --card:#121317; --danger:#ff6b6b; --success:#5ee8a1;
        }
        *{box-sizing:border-box}
        body{
            margin:0; font-family:'Inter',sans-serif; background:linear-gradient(180deg,#0b0c0f 0%, #0f1115 100%); color:#e6eef6;
            height:100vh; display:flex; overflow:hidden;
        }

        /* left column - explorer */
        .left{
            width:340px; border-right:1px solid rgba(255,255,255,0.03); background:var(--panel); padding:14px; display:flex; flex-direction:column;
        }
        .topbar{
            display:flex; gap:8px; align-items:center; margin-bottom:12px;
        }
        .logo{ font-weight:700; font-size:16px; color:var(--accent-2); }
        .search{
            flex:1; display:flex; gap:8px;
        }
        input.search-input{
            width:100%; padding:8px 12px; border-radius:8px; border:none; background:#0b0b0d; color:#fff;
            outline: none; box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
        }
        .btn{
            background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#041025; padding:8px 10px; border-radius:8px; border:none; cursor:pointer; font-weight:600;
        }
        .small{ padding:6px 8px; font-size:13px }

        .controls{ display:flex; gap:8px; margin-bottom:12px; }
        .file-list{ flex:1; overflow:auto; padding-right:6px; }
        .folder, .file-item{
            display:flex; align-items:center; justify-content:space-between; padding:10px; border-radius:8px; margin-bottom:6px;
            transition:background .12s, transform .06s;
            background:transparent; cursor:pointer;
        }
        .folder:hover, .file-item:hover{ background: rgba(255,255,255,0.02); transform:translateY(-1px); }
        .file-item .meta{ color:var(--muted); font-size:13px; }

        /* right column - preview/editor */
        .right{ flex:1; display:flex; flex-direction:column; gap:12px; padding:18px; }
        .header{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
        .file-name{ font-size:18px; font-weight:600; color:#fff; }
        .actions{ display:flex; gap:8px; }
        .action-btn{ background:#0e1012; color:var(--muted); border:1px solid rgba(255,255,255,0.03); padding:8px 10px; border-radius:8px; cursor:pointer; }
        .action-btn.primary{ background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#041025; font-weight:700; border:none; }
        .pane{ background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00)); border-radius:10px; padding:12px; height:calc(100% - 70px); overflow:auto; border:1px solid rgba(255,255,255,0.02); }
        textarea.editor{ width:100%; height:100%; background:transparent; color:#e6eef6; border:none; outline:none; resize:none; font-family: 'Inter', monospace; font-size:14px; line-height:1.5; }

        .muted{ color:var(--muted); font-size:13px; }

        /* confirm dialog */
        .confirm{
            position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:#060609; padding:20px; border-radius:12px; z-index:40;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6); display:none;
        }
    </style>
</head>
<body>
<div class="left">
    <div class="topbar">
        <div class="logo">RAG Explorer</div>
        <div style="flex:1"></div>
        <button id="refreshBtn" class="btn small">Refresh</button>
    </div>

    <div class="controls">
        <div style="flex:1" class="search">
            <input id="searchInput" class="search-input" placeholder="Search file names..." />
        </div>
        <button id="newFolderBtn" class="action-btn small">New Folder</button>
        <label class="btn small" style="display:inline-block">
            Upload
            <input id="uploadInput" type="file" style="display:none" />
        </label>
    </div>

    <div id="fileList" class="file-list"></div>

    <div style="margin-top:8px" class="muted">Path: <span id="currentPath">/</span></div>
</div>

<div class="right">
    <div class="header">
        <div>
            <div class="file-name" id="selectedName">Select a file</div>
            <div class="muted" id="selectedMeta">No file selected</div>
        </div>
        <div class="actions">
            <button id="downloadBtn" class="action-btn">Download</button>
            <button id="renameBtn" class="action-btn">Rename</button>
            <button id="deleteBtn" class="action-btn" style="color:var(--danger); border-color:rgba(255,107,107,0.12)">Delete</button>
            <button id="saveBtn" class="action-btn primary">Save</button>
        </div>
    </div>

    <div class="pane">
        <textarea id="editor" class="editor" placeholder="File content will appear here..." disabled></textarea>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center">
        <div class="muted" id="footerStatus">Ready</div>
        <div class="muted">Files: <span id="fileCount">0</span></div>
    </div>
</div>

<!-- confirm -->
<div id="confirm" class="confirm">
    <div id="confirmText">Confirm?</div>
    <div style="margin-top:12px; display:flex; gap:8px; justify-content:flex-end">
        <button id="confirmNo" class="action-btn">No</button>
        <button id="confirmYes" class="action-btn primary">Yes</button>
    </div>
</div>

<script>
    const fileListEl = document.getElementById('fileList');
    const editorEl = document.getElementById('editor');
    const selectedNameEl = document.getElementById('selectedName');
    const selectedMetaEl = document.getElementById('selectedMeta');
    const footerStatus = document.getElementById('footerStatus');
    const fileCountEl = document.getElementById('fileCount');
    const currentPathEl = document.getElementById('currentPath');

    let currentPath = "";
    let selectedPath = null;
    let filesCache = [];

    // Updated API calls
    async function apiList(path="") {
        const url = '/api/explorer/files' + (path ? ('?path=' + encodeURIComponent(path)) : '');
        const res = await fetch(url);
        return res.json();
    }

    async function apiView(path) {
        const res = await fetch('/api/explorer/files/view?path=' + encodeURIComponent(path));
        return res.json();
    }

    async function apiSave(path, content) {
        const res = await fetch('/api/explorer/files/save', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({path, content})
        });
        return res.json();
    }

    async function apiDelete(path) {
        const res = await fetch('/api/explorer/files/delete', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({path})
        });
        return res.json();
    }

    async function apiRename(path, newName) {
        const res = await fetch('/api/explorer/files/rename', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({old: path, new: newName})
        });
        return res.json();
    }

    async function apiMkdir(path, name) {
        const res = await fetch('/api/explorer/files/mkdir', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({path: name})
        });
        return res.json();
    }

    async function apiUpload(path, file) {
        const form = new FormData();
        form.append('path', path || '');
        form.append('file', file);
        const res = await fetch('/api/explorer/files/upload', { method:'POST', body: form });
        return res.json();
    }

    async function apiDownload(path) {
        window.location.href = '/api/explorer/files/download?path=' + encodeURIComponent(path);
    }

    function setStatus(t) { footerStatus.textContent = t; }

    function renderFiles(items) {
        filesCache = items;
        fileListEl.innerHTML = '';
        if (!items || items.length === 0) {
            fileListEl.innerHTML = '<div class="muted">Folder empty</div>';
            fileCountEl.textContent = 0;
            return;
        }
        let count = 0;
        items.forEach(it => {
            const div = document.createElement('div');
            if (it.is_dir) {
                div.className = 'folder';
                div.innerHTML = `<div style="display:flex;flex-direction:column"><strong>${it.name}/</strong><div class="muted">${new Date(it.modified*1000).toLocaleString()}</div></div>
                                 <div class="muted">Folder</div>`;
                div.onclick = () => {
                    currentPath = (currentPath ? (currentPath + '/' + it.name) : it.name);
                    loadCurrent();
                };
            } else {
                div.className = 'file-item';
                div.innerHTML = `<div><strong>${it.name}</strong><div class="muted">${(it.size/1024).toFixed(1)} KB • ${new Date(it.modified*1000).toLocaleString()}</div></div>
                                 <div class="meta">file</div>`;
                div.onclick = () => selectFile(it.name);
            }
            fileListEl.appendChild(div);
            count++;
        });
        fileCountEl.textContent = count;
    }

    async function loadCurrent() {
        setStatus('Loading files...');
        currentPathEl.textContent = currentPath ? ('/' + currentPath) : '/';
        const j = await apiList(currentPath);
        if (j.error) {
            setStatus('Error listing: ' + j.error);
            renderFiles([]);
            return;
        }
        renderFiles(j.files || []);
        setStatus('Files loaded');
        clearSelection();
    }

    async function selectFile(name) {
        const rel = currentPath ? (currentPath + '/' + name) : name;
        setStatus('Loading file...');
        selectedPath = rel;
        const j = await apiView(rel);
        if (j.error) {
            setStatus('Error: ' + j.error);
            return;
        }
        selectedNameEl.textContent = j.name;
        selectedMetaEl.textContent = `${(j.size/1024).toFixed(1)} KB`;
        editorEl.disabled = false;
        editorEl.value = j.content || '';
        setStatus('File loaded');
    }

    function clearSelection() {
        selectedPath = null;
        selectedNameEl.textContent = 'Select a file';
        selectedMetaEl.textContent = 'No file selected';
        editorEl.value = '';
        editorEl.disabled = true;
    }

    // Buttons
    document.getElementById('saveBtn').addEventListener('click', async () => {
        if (!selectedPath) { setStatus('No file selected'); return; }
        setStatus('Saving...');
        const j = await apiSave(selectedPath, editorEl.value);
        setStatus(j.ok ? 'Saved' : ('Save failed: ' + (j.error || 'unknown')));
        loadCurrent();
    });

    document.getElementById('deleteBtn').addEventListener('click', () => {
        if (!selectedPath) { setStatus('No file selected'); return; }
        confirmDialog(`Delete "${selectedPath}"?`, async () => {
            const j = await apiDelete(selectedPath);
            if (j.ok) {
                setStatus('Deleted');
                clearSelection();
                loadCurrent();
            } else setStatus('Delete failed: ' + (j.error || 'unknown'));
        });
    });

    document.getElementById('renameBtn').addEventListener('click', async () => {
        if (!selectedPath) { setStatus('No file selected'); return; }
        const newName = prompt('New name (filename only):', selectedPath.split('/').pop());
        if (!newName) return;
        setStatus('Renaming...');
        const j = await apiRename(selectedPath, newName);
        if (j.ok) {
            setStatus('Renamed');
            const parts = selectedPath.split('/');
            parts[parts.length-1] = newName;
            selectedPath = parts.join('/');
            loadCurrent();
        } else setStatus('Rename failed: ' + (j.error || 'unknown'));
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
        if (!selectedPath) { setStatus('No file selected'); return; }
        apiDownload(selectedPath);
    });

    document.getElementById('newFolderBtn').addEventListener('click', async () => {
        const name = prompt('Folder name:');
        if (!name) return;
        setStatus('Creating folder...');
        const j = await apiMkdir(currentPath, name);
        setStatus(j.ok ? 'Folder created' : ('Create failed: ' + (j.error || 'unknown')));
        loadCurrent();
    });

    document.getElementById('uploadInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setStatus('Uploading...');
        const j = await apiUpload(currentPath, file);
        setStatus(j.ok ? 'Uploaded' : ('Upload failed: ' + (j.error || 'unknown')));
        loadCurrent();
        e.target.value = '';
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase().trim();
        renderFiles(q ? filesCache.filter(it => it.name.toLowerCase().includes(q)) : filesCache);
    });

    document.getElementById('refreshBtn').addEventListener('click', loadCurrent);

    // Confirm dialog helpers
    const confirmEl = document.getElementById('confirm');
    const confirmText = document.getElementById('confirmText');
    const confirmYes = document.getElementById('confirmYes');
    const confirmNo = document.getElementById('confirmNo');
    let confirmCallback = null;
    function confirmDialog(text, cb) {
        confirmText.textContent = text;
        confirmEl.style.display = 'block';
        confirmCallback = cb;
    }
    confirmYes.addEventListener('click', () => { confirmEl.style.display='none'; if(confirmCallback) confirmCallback(); confirmCallback=null; });
    confirmNo.addEventListener('click', () => { confirmEl.style.display='none'; confirmCallback=null; });

    // Load initial
    loadCurrent();
</script>
</body>
</html>
