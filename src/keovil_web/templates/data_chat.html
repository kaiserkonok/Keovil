<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/keo.png') }}">
    <title>Structured Data Lab | Keovil</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/data_chat.css') }}">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <button class="new-chat-btn" onclick="startNewChat()">
            <span>+</span> New Analysis
        </button>
    </div>
    <div class="session-container">
        <div class="history-section-title">Recent Analysis</div>
        <div id="session-list"></div>
    </div>
</div>

<div class="main-content">
    <div class="notebook-container" id="notebook">
        <div class="header-area">
            <div style="display: flex; flex-direction: column;">
                <a href="/" class="brand-link">&lt;Keovil /&gt;</a>
                <div id="session-status" style="font-family: 'Fira Code'; font-size: 11px; color: var(--input-num); margin-top: 5px;">Stateless Engine</div>
            </div>
            <div class="header-actions">
                <button class="new-chat-btn" style="padding: 6px 12px; font-size: 12px;" onclick="deleteCurrentSession()">
                    Clear Notebook
                </button>
            </div>
        </div>
    </div>

    <div class="query-bar">
        <textarea class="query-input" id="userInput" placeholder="Ask your data..." onkeydown="handleKey(event)" rows="1" autofocus></textarea>
    </div>
</div>

<div id="deleteModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-msg">Delete this analysis session?</div>
        <div class="modal-btns">
            <button class="m-btn m-cancel" onclick="closeModal(false)">Cancel</button>
            <button class="m-btn m-delete" onclick="closeModal(true)">Delete</button>
        </div>
    </div>
</div>

<div id="ingest-status-card">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <div id="status-dot" class="status-indicator"></div>
        <span id="status-title" style="font-family: 'Fira Code', monospace; font-size: 12px; color: var(--accent); font-weight: 500;">SQL ENGINE ACTIVE</span>
    </div>
    <div style="height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; margin: 8px 0;">
        <div id="ingest-progress-bar" style="height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease;"></div>
    </div>
    <span id="current-status-detail" style="font-size: 11px; font-family: 'Fira Code', monospace; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;">Syncing Views...</span>
</div>

<script src="{{ url_for('static', filename='js/data_chat.js') }}"></script>
</body>
</html>
