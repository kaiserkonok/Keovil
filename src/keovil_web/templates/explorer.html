<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Explorer | Keovil</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/keo.png') }}">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/themes/default/style.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/jstree.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <script src="https://unpkg.com/mammoth@1.5.1/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/explorer.css') }}">
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="brand-link" title="Return to Dashboard">
                &lt;Explorer /&gt;
            </a>
        </div>
        <div class="controls">
            <button class="btn" id="refreshBtn" title="Refresh"><i class="fas fa-sync-alt"></i></button>
            <button class="btn" id="newFolderBtn" title="New Folder"><i class="fas fa-folder-plus"></i></button>
            <button class="btn" id="newFileBtn" title="New File"><i class="fas fa-file-medical"></i></button>

            <div class="upload-dropdown">
                <button class="btn primary" id="uploadMainBtn" title="Upload">
                    <i class="fas fa-upload"></i>
                </button>
                <div class="upload-options" id="uploadOptions">
                    <div class="upload-item" id="optUploadFiles"><i class="fas fa-file"></i> Files</div>
                    <div class="upload-item" id="optUploadFolder"><i class="fas fa-folder"></i> Folder</div>
                </div>
            </div>
        </div>
        <div id="tree-container"><div id="file-tree"></div></div>
    </div>

    <div id="editor-panel">
        <div class="editor-header">
            <div class="file-info">
                <h2 id="fileName">No file selected</h2>
                <div class="path" id="filePath">Select a cell or file to view</div>
            </div>
            <div class="editor-actions">
                <button class="btn" id="renameBtn" title="Rename" style="display:none;"><i class="fas fa-edit"></i></button>
                <button class="btn danger" id="deleteBtn" title="Delete" style="display:none;"><i class="fas fa-trash"></i></button>
                <button class="btn primary" id="saveBtn" title="Save (Ctrl+S)" style="display:none;"><i class="fas fa-save"></i> Save</button>
            </div>
        </div>

        <textarea id="editor" style="display:none;"></textarea>

        <div id="pdf-viewer" style="display:none; flex:1; flex-direction:column;">
            <div class="pdf-controls" style="padding:10px; display:flex; align-items:center; gap:15px; justify-content:center;">
                <button class="btn" id="pdf-prev"><i class="fas fa-chevron-left"></i></button>
                <span id="pdf-page-info" style="font-family:'Fira Code'; font-size:13px;">Page: <span id="pdf-current-page">1</span> / <span id="pdf-total-pages">1</span></span>
                <button class="btn" id="pdf-next"><i class="fas fa-chevron-right"></i></button>
                <select id="pdf-zoom" style="background:var(--bg-deep); color:#fff; border:1px solid var(--border); border-radius:4px; padding:4px;">
                    <option value="0.5">50%</option>
                    <option value="1" selected>100%</option>
                    <option value="1.5">150%</option>
                </select>
                <button class="btn" id="pdf-download"><i class="fas fa-download"></i></button>
            </div>
            <div id="pdf-canvas-container" style="flex:1; overflow:auto; display:flex; justify-content:center; background:#1c1e22; padding:20px;"></div>
        </div>

        <div id="doc-viewer" style="display:none; overflow:auto;"></div>

        <div id="spreadsheet-viewer" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
            <div class="controls" style="background: var(--sidebar-bg); padding:10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;">
                <select id="sheet-selector" style="background:var(--bg-deep); color:#fff; border:1px solid var(--border); padding:5px; border-radius:4px; min-width:150px;"></select>
                <button class="btn" id="sheet-download"><i class="fas fa-download"></i> Download</button>
                <span id="sheet-stats" style="font-size:11px; color:var(--muted); font-family:'Fira Code'; margin-left:auto;"></span>
            </div>
            <div id="sheet-table-container" style="flex:1; overflow:auto;"></div>
        </div>

        <div id="database-viewer" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
            <div class="controls" style="background: var(--sidebar-bg); padding:10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;">
                <span style="font-size:12px; color:var(--muted); font-family:'Fira Code';">TABLE:</span>
                <select id="db-table-selector" style="background:var(--bg-deep); color:#fff; border:1px solid var(--border); padding:5px; border-radius:4px; min-width:150px;"></select>
                <span id="db-stats" style="font-size:11px; color:var(--muted); font-family:'Fira Code'; margin-left:auto;"></span>
            </div>
            <div id="db-grid-container" style="flex:1; overflow:auto;"></div>
        </div>

        <div class="editor-placeholder" id="editorPlaceholder">
            <div style="text-align:center;">
                <div style="font-size:48px; margin-bottom:20px; color: var(--border);"><i class="fas fa-terminal"></i></div>
                <div>Select a file from the tree to view</div>
            </div>
        </div>

        <div class="status-bar">
            <span id="fileStats">--</span>
            <span id="charCount">CHARS: 0</span>
        </div>
    </div>

    <input type="file" id="fileInput" style="display:none;" multiple>
    <input type="file" id="folderInput" style="display:none;" webkitdirectory directory multiple>

    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" data-action="open"><i class="fas fa-folder-open"></i>Open</div>
        <div class="context-menu-item" data-action="download"><i class="fas fa-download"></i>Download</div>
        <div class="context-menu-item" data-action="rename"><i class="fas fa-edit"></i>Rename</div>
        <div class="context-menu-item" data-action="delete"><i class="fas fa-trash"></i>Delete</div>
        <div class="context-menu-divider" style="height:1px; background:var(--border); margin:4px 0;"></div>
        <div class="context-menu-item" data-action="newFile"><i class="fas fa-file-medical"></i>New File</div>
        <div class="context-menu-item" data-action="newFolder"><i class="fas fa-folder-plus"></i>New Folder</div>
    </div>

    <div id="ingest-status-card">
        <div class="status-header">
            <div id="status-dot" class="status-indicator"></div>
            <span class="status-text" id="status-title">INGESTING DATA...</span>
        </div>
        <div class="progress-container">
            <div id="ingest-progress-bar"></div>
        </div>
        <span class="status-text" id="current-ingest-file">Initializing...</span>
    </div>

    <script src="{{ url_for('static', filename='js/explorer.js') }}"></script>
</body>
</html>
