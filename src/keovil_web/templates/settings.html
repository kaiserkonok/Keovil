<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keovil | Settings</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/keo.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="mb-8 text-center">
        <h1 class="text-4xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-500">SYSTEM PREFERENCES</h1>
        <p class="text-zinc-500 text-sm mt-2 uppercase tracking-widest">Keo Configuration</p>
    </div>

    <div class="w-full max-w-2xl glass-panel rounded-[2rem] p-8 shadow-2xl shadow-violet-900/10">
        <form id="llmForm" class="space-y-6">
            <!-- Provider Selection -->
            <div>
                <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2">LLM Provider</label>
                <select id="provider" name="provider" 
                    class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:border-violet-500 focus:outline-none"
                    onchange="toggleProviderFields()">
                    <option value="ollama">Ollama (Local)</option>
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openrouter">OpenRouter</option>
                    <option value="gemini">Google Gemini</option>
                </select>
            </div>

            <!-- Model Name -->
            <div>
                <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2">Model Name</label>
                <div class="relative">
                    <input type="text" id="model" name="model" 
                        class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:border-violet-500 focus:outline-none"
                        placeholder="Type to search models..."
                        autocomplete="off">
                    <button type="button" onclick="loadModels()" 
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-violet-400 transition-colors"
                        title="Load available models">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                    <div id="modelDropdown" class="absolute z-50 w-full mt-1 bg-zinc-900 border border-zinc-700 rounded-xl max-h-60 overflow-y-auto hidden">
                    </div>
                </div>
                <p class="text-zinc-600 text-xs mt-1" id="modelHint">For Ollama: model name (e.g., qwen2.5-coder:7b)</p>
            </div>

            <!-- Ollama Host (only for Ollama) -->
            <div id="ollamaHostField">
                <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2">Ollama Host</label>
                <input type="text" id="ollamaHost" name="ollama_host" 
                    class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:border-violet-500 focus:outline-none"
                    placeholder="http://127.0.0.1:11434">
            </div>

            <!-- OpenAI API Key -->
            <div id="openaiField" class="hidden">
                <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2">OpenAI API Key</label>
                <input type="password" id="openaiKey" name="openai_api_key" 
                    class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:border-violet-500 focus:outline-none"
                    placeholder="sk-...">
            </div>

            <!-- Anthropic API Key -->
            <div id="anthropicField" class="hidden">
                <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2">Anthropic API Key</label>
                <input type="password" id="anthropicKey" name="anthropic_api_key" 
                    class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:border-violet-500 focus:outline-none"
                    placeholder="sk-ant-...">
            </div>

            <!-- OpenRouter API Key -->
            <div id="openrouterField" class="hidden">
                <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2">OpenRouter API Key</label>
                <input type="password" id="openrouterKey" name="openrouter_api_key" 
                    class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:border-violet-500 focus:outline-none"
                    placeholder="sk-or-...">
            </div>

            <!-- Gemini API Key -->
            <div id="geminiField" class="hidden">
                <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2">Gemini API Key</label>
                <input type="password" id="geminiKey" name="gemini_api_key" 
                    class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-white focus:border-violet-500 focus:outline-none"
                    placeholder="AIza...">
            </div>

            <!-- Temperature -->
            <div>
                <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2">Temperature: <span id="tempValue">0.0</span></label>
                <input type="range" id="temperature" name="temperature" min="0" max="2" step="0.1" value="0"
                    class="w-full accent-violet-500" oninput="document.getElementById('tempValue').textContent = this.value">
            </div>

            <!-- Save Button -->
            <button type="submit" 
                class="w-full py-4 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white font-bold rounded-2xl hover:from-violet-500 hover:to-fuchsia-500 transition-all uppercase tracking-widest">
                Save Configuration
            </button>

            <!-- Status Message -->
            <div id="statusMessage" class="hidden p-4 rounded-xl text-center"></div>
        </form>

        <div class="pt-6 mt-6 border-t border-zinc-800">
            <button onclick="testConnection()" 
                class="w-full py-3 bg-zinc-900 border border-zinc-700 text-zinc-300 text-sm font-bold rounded-2xl hover:bg-zinc-800 transition-all uppercase tracking-widest">
                Test Connection
            </button>
        </div>

        <a href="/" class="block text-center mt-6 text-zinc-500 hover:text-white text-sm transition-colors tracking-tight">Return to Dashboard</a>
    </div>

    <script>
        // Load current config on page load
        fetch('/api/config')
            .then(r => r.json())
            .then(config => {
                document.getElementById('provider').value = config.provider || 'ollama';
                document.getElementById('model').value = config.model || '';
                document.getElementById('ollamaHost').value = config.ollama_host || 'http://127.0.0.1:11434';
                document.getElementById('openaiKey').value = config.openai_api_key || '';
                document.getElementById('anthropicKey').value = config.anthropic_api_key || '';
                document.getElementById('openrouterKey').value = config.openrouter_api_key || '';
                document.getElementById('geminiKey').value = config.gemini_api_key || '';
                document.getElementById('temperature').value = config.temperature || 0;
                document.getElementById('tempValue').textContent = config.temperature || 0;
                toggleProviderFields();
                
                // Auto-load models after config loads
                setTimeout(loadModels, 500);
            });

        function toggleProviderFields() {
            const provider = document.getElementById('provider').value;
            
            document.getElementById('ollamaHostField').classList.toggle('hidden', provider !== 'ollama');
            document.getElementById('openaiField').classList.toggle('hidden', provider !== 'openai');
            document.getElementById('anthropicField').classList.toggle('hidden', provider !== 'anthropic');
            document.getElementById('openrouterField').classList.toggle('hidden', provider !== 'openrouter');
            document.getElementById('geminiField').classList.toggle('hidden', provider !== 'gemini');
            
            // Update model hint
            const hints = {
                'ollama': 'For Ollama: model name (e.g., qwen2.5-coder:7b)',
                'openai': 'For OpenAI: gpt-4o, gpt-4o-mini, gpt-4-turbo, etc.',
                'anthropic': 'For Anthropic: claude-3-5-sonnet-20241022, claude-3-opus-20240229, etc.',
                'openrouter': 'For OpenRouter: openai/gpt-4o-mini, anthropic/claude-3.5-sonnet, etc.',
                'gemini': 'For Gemini: gemini-2.0-flash, gemini-1.5-pro, etc.'
            };
            document.getElementById('modelHint').textContent = hints[provider] || '';
        }

        document.getElementById('llmForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const config = {
                provider: formData.get('provider'),
                model: formData.get('model'),
                ollama_host: formData.get('ollama_host'),
                openai_api_key: formData.get('openai_api_key'),
                anthropic_api_key: formData.get('anthropic_api_key'),
                openrouter_api_key: formData.get('openrouter_api_key'),
                gemini_api_key: formData.get('gemini_api_key'),
                temperature: parseFloat(formData.get('temperature'))
            };

            const response = await fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(config)
            });

            const result = await response.json();
            const statusEl = document.getElementById('statusMessage');
            
            if (response.ok) {
                statusEl.textContent = 'Configuration saved! Restart the server to apply changes.';
                statusEl.className = 'p-4 rounded-xl text-center bg-green-900/30 text-green-400 border border-green-800';
            } else {
                statusEl.textContent = 'Error: ' + (result.error || 'Failed to save');
                statusEl.className = 'p-4 rounded-xl text-center bg-red-900/30 text-red-400 border border-red-800';
            }
            statusEl.classList.remove('hidden');
        };

        async function testConnection() {
            const provider = document.getElementById('provider').value;
            const model = document.getElementById('model').value;
            const statusEl = document.getElementById('statusMessage');
            
            // Gather the API key and model based on provider
            let apiKey = '';
            if (provider === 'openai') {
                apiKey = document.getElementById('openaiKey').value;
            } else if (provider === 'anthropic') {
                apiKey = document.getElementById('anthropicKey').value;
            } else if (provider === 'openrouter') {
                apiKey = document.getElementById('openrouterKey').value;
            } else if (provider === 'gemini') {
                apiKey = document.getElementById('geminiKey').value;
            }
            
            statusEl.textContent = 'Testing connection...';
            statusEl.className = 'p-4 rounded-xl text-center bg-yellow-900/30 text-yellow-400 border border-yellow-800';
            statusEl.classList.remove('hidden');

            try {
                const response = await fetch('/api/config/test', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        provider,
                        model: model,  // Pass model name
                        openai_api_key: provider === 'openai' ? apiKey : null,
                        anthropic_api_key: provider === 'anthropic' ? apiKey : null,
                        openrouter_api_key: provider === 'openrouter' ? apiKey : null,
                        google_api_key: provider === 'gemini' ? apiKey : null
                    })
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    statusEl.textContent = '✅ Connection successful! Model: ' + result.model;
                    statusEl.className = 'p-4 rounded-xl text-center bg-green-900/30 text-green-400 border border-green-800';
                } else {
                    statusEl.textContent = '❌ Error: ' + (result.error || 'Connection failed');
                    statusEl.className = 'p-4 rounded-xl text-center bg-red-900/30 text-red-400 border border-red-800';
                }
            } catch (err) {
                statusEl.textContent = '❌ Error: ' + err.message;
                statusEl.className = 'p-4 rounded-xl text-center bg-red-900/30 text-red-400 border border-red-800';
            }
        }

        async function loadModels() {
            const provider = document.getElementById('provider').value;
            const datalist = document.getElementById('modelList');
            const statusEl = document.getElementById('statusMessage');
            
            let apiKey = '';
            let host = 'http://127.0.0.1:11434';
            
            if (provider === 'openai') {
                apiKey = document.getElementById('openaiKey').value;
            } else if (provider === 'anthropic') {
                apiKey = document.getElementById('anthropicKey').value;
            } else if (provider === 'openrouter') {
                apiKey = document.getElementById('openrouterKey').value;
            } else if (provider === 'gemini') {
                apiKey = document.getElementById('geminiKey').value;
            } else if (provider === 'ollama') {
                host = document.getElementById('ollamaHost').value || host;
            }
            
            try {
                console.log('Loading models for provider:', provider, 'with API key:', apiKey ? 'set' : 'not set');
                statusEl.textContent = 'Loading models...';
                statusEl.className = 'p-4 rounded-xl text-center bg-yellow-900/30 text-yellow-400 border border-yellow-800';
                statusEl.classList.remove('hidden');
                
                const response = await fetch('/api/models', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        provider,
                        api_key: apiKey,
                        host: host
                    })
                });
                
                console.log('Response status:', response.status);
                const result = await response.json();
                console.log('Result:', result);
                
                if (response.ok && result.models) {
                    window.availableModels = result.models;
                    const dropdown = document.getElementById('modelDropdown');
                    dropdown.innerHTML = '';
                    result.models.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'px-4 py-2 hover:bg-violet-600 cursor-pointer text-white text-sm';
                        div.textContent = m.name;
                        div.onclick = () => {
                            document.getElementById('model').value = m.name;
                            dropdown.classList.add('hidden');
                        };
                        dropdown.appendChild(div);
                    });
                    dropdown.classList.remove('hidden');
                    statusEl.textContent = '✅ Loaded ' + result.models.length + ' models';
                    statusEl.className = 'p-4 rounded-xl text-center bg-green-900/30 text-green-400 border border-green-800';
                } else {
                    statusEl.textContent = '⚠️ ' + (result.error || 'No models found');
                    statusEl.className = 'p-4 rounded-xl text-center bg-yellow-900/30 text-yellow-400 border border-yellow-800';
                }
            } catch (err) {
                console.error('Error:', err);
                statusEl.textContent = '❌ Error loading models: ' + err.message;
                statusEl.className = 'p-4 rounded-xl text-center bg-red-900/30 text-red-400 border border-red-800';
            }
            
            setTimeout(() => statusEl.classList.add('hidden'), 3000);
        }
        
        // Filter model dropdown as user types
        document.getElementById('model').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const dropdown = document.getElementById('modelDropdown');
            
            if (window.availableModels && window.availableModels.length > 0) {
                dropdown.innerHTML = '';
                const filtered = window.availableModels.filter(m => 
                    m.name.toLowerCase().includes(query)
                );
                filtered.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'px-4 py-2 hover:bg-violet-600 cursor-pointer text-white text-sm';
                    div.textContent = m.name;
                    div.onclick = () => {
                        document.getElementById('model').value = m.name;
                        dropdown.classList.add('hidden');
                    };
                    dropdown.appendChild(div);
                });
                if (filtered.length > 0) {
                    dropdown.classList.remove('hidden');
                } else {
                    dropdown.classList.add('hidden');
                }
            }
        });

        // Hide dropdown when clicking outside
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('modelDropdown');
            const input = document.getElementById('model');
            if (!dropdown.contains(e.target) && e.target !== input) {
                dropdown.classList.add('hidden');
            }
        });

        // Clear models when provider changes
        document.getElementById('provider').addEventListener('change', () => {
            window.availableModels = [];
            document.getElementById('modelDropdown').innerHTML = '';
        });
    </script>
</body>
</html>
