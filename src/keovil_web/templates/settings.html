<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keovil | Settings</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/keo.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="mb-10 text-center">
        <h1 class="text-4xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-500">SYSTEM PREFERENCES</h1>
        <p class="text-zinc-500 text-sm mt-2 uppercase tracking-widest">Keo Configuration</p>
    </div>

    <div class="w-full max-w-lg glass-panel rounded-[2rem] p-10 shadow-2xl shadow-violet-900/10">
        <div class="space-y-6">
            <div class="bg-zinc-900/50 rounded-xl p-4 border border-zinc-800">
                <p class="text-zinc-500 text-xs uppercase tracking-widest mb-2">Model</p>
                <p class="text-violet-400 font-mono">qwen2.5-coder:7b-instruct</p>
            </div>

            <div class="pt-4">
                <button onclick="deactivateNode()" class="w-full py-4 bg-zinc-900 border border-red-900/30 text-red-500 text-sm font-bold rounded-2xl hover:bg-red-950/30 transition-all uppercase tracking-widest">
                    Deactivate This Node
                </button>
            </div>
            <a href="/" class="block text-center mt-6 text-zinc-500 hover:text-white text-sm transition-colors tracking-tight">Return to Dashboard</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
