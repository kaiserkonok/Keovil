<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keovil | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #ffffff; }
        .glass-panel { background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { position: relative; }
        .neon-border::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #8b5cf6; transition: width 0.3s ease; }
        .neon-border:focus-within::after { width: 100%; }
        input[type="range"] { accent-color: #8b5cf6; }

        /* Custom styling for the disabled select to keep the aesthetic */
        select:disabled { opacity: 0.7; cursor: not-allowed; -webkit-appearance: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="mb-10 text-center">
        <h1 class="text-4xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-500">SYSTEM PREFERENCES</h1>
        <p class="text-zinc-500 text-sm mt-2 uppercase tracking-widest">Optimize Lora's Brain & Logic</p>
    </div>

    <div class="w-full max-w-lg glass-panel rounded-[2rem] p-10 shadow-2xl shadow-violet-900/10">
        <div class="space-y-10">

            <div class="neon-border">
                <label class="block text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4">Neural Core (Optimized)</label>
            </div>

            <div>
                <div class="flex justify-between items-end mb-4">
                    <label class="block text-xs font-bold text-zinc-400 uppercase tracking-widest">Intelligence Mode</label>
                    <span id="modeLabel" class="text-2xl font-light text-violet-400">Precise</span>
                </div>
                <input type="range" id="tempRange" min="0" max="0.5" step="0.25" value="0" class="w-full h-1 bg-zinc-800 rounded-full appearance-none cursor-pointer">

                <div class="flex justify-between text-[10px] font-bold text-zinc-600 mt-4 uppercase tracking-tighter">
                    <div class="text-center">
                        <span class="block text-violet-500">SQL & Data</span>
                        <span>0.0</span>
                    </div>
                    <div class="text-center">
                        <span class="block">Balanced</span>
                        <span>0.25</span>
                    </div>
                    <div class="text-center">
                        <span class="block text-fuchsia-500">Creative</span>
                        <span>0.5</span>
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <button onclick="updateSettings()" id="saveBtn" class="w-full py-5 bg-white text-black font-bold rounded-2xl hover:bg-violet-500 hover:text-white transition-all active:scale-95 shadow-xl">
                    SYNC NEURAL ENGINE
                </button>
                <div class="mt-12 pt-8 border-t border-white/5">
                    <button onclick="deactivateNode()" class="w-full py-3 bg-zinc-900 border border-red-900/30 text-red-500 text-xs font-bold rounded-xl hover:bg-red-950/30 transition-all uppercase tracking-widest">
                        Deactivate This Node
                    </button>
                </div>
                <a href="/" class="block text-center mt-6 text-zinc-500 hover:text-white text-sm transition-colors tracking-tight">Return to Dashboard</a>
            </div>

        </div>
    </div>

    <script>
        const tempRange = document.getElementById('tempRange');
        const modeLabel = document.getElementById('modeLabel');
        const modelSelect = document.getElementById('modelSelect');
        const saveBtn = document.getElementById('saveBtn');

        const modeMap = {
            "0": "Strict Logic",
            "0.25": "Balanced",
            "0.5": "Creative"
        };

        // Fetch current settings on load
        async function fetchSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();

                // We keep the internal value for the API, but map it to the slider
                tempRange.value = data.temperature;
                updateModeLabel(data.temperature);
            } catch (err) {
                console.error("Failed to fetch settings:", err);
            }
        }

        function updateModeLabel(val) {
            // Find closest mode name
            modeLabel.innerText = modeMap[val] || "Custom";
        }

        tempRange.addEventListener('input', (e) => {
            updateModeLabel(e.target.value);
        });

        async function updateSettings() {
            const originalText = saveBtn.innerText;
            saveBtn.innerText = "RECONFIGURING...";
            saveBtn.disabled = true;

            const payload = {
                // Hardcoded to ensure the user doesn't break the backend config
                llm_model: "qwen2.5-coder:7b-instruct",
                temperature: parseFloat(tempRange.value)
            };

            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    saveBtn.innerText = "ENGINE OPTIMIZED";
                    saveBtn.classList.replace('bg-white', 'bg-emerald-500');
                    saveBtn.classList.replace('text-black', 'text-white');

                    setTimeout(() => {
                        saveBtn.innerText = originalText;
                        saveBtn.classList.replace('bg-emerald-500', 'bg-white');
                        saveBtn.classList.replace('text-white', 'text-black');
                        saveBtn.disabled = false;
                    }, 2000);
                }
            } catch (err) {
                saveBtn.innerText = "SYNC FAILED";
                saveBtn.classList.replace('bg-white', 'bg-red-500');
                setTimeout(() => {
                    saveBtn.innerText = originalText;
                    saveBtn.classList.replace('bg-red-500', 'bg-white');
                    saveBtn.disabled = false;
                }, 2000);
            }
        }

        fetchSettings();

        async function deactivateNode() {
            if (!confirm("CRITICAL: This will unbind the Master Key from this hardware. You will be locked out until re-activation. Proceed?")) return;

            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                if (res.ok) {
                    window.location.href = '/activate'; // Send them back to the bouncer
                }
            } catch (err) {
                alert("Logout failed: " + err);
            }
        }
    </script>
</body>
</html>
